services:
  soup:
    image: ghcr.io/makazhanalpamys/soup:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host  # Recommended for PyTorch multi-processing
